name: riso
description: Cliente de IA local y agente de automatización de correo electrónico.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  flutter_secure_storage: ^9.2.4

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  google_generative_ai: ^0.4.6

  http: ^1.3.0
  dio: ^5.7.0

  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  mailer: ^6.4.1

  flutter_markdown: ^0.7.6
  markdown: ^7.3.0

  share_plus: ^10.1.4
  file_picker: ^8.1.7
  archive: ^4.0.2
  path_provider: ^2.1.5

  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  mocktail: ^1.0.4
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^2.5.8
  riverpod_generator: ^2.6.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
